<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-md rounded-xl shadow p-6">

    <h1 class="text-2xl font-bold mb-2 text-center">
      Login Editor
    </h1>
    <p class="text-gray-500 text-sm mb-6 text-center">
      Panel Manajemen Berita
    </p>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 text-sm text-red-600">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium mb-1">
          Username
        </label>
        <input
          type="text"
          name="username"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400"
        >
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Password
        </label>
        <input
          type="password"
          name="password"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-[#FFC107] hover:bg-yellow-500 text-black font-semibold py-2 rounded-lg"
      >
        Login
      </button>
    </form>

  </div>

</body>
</html>
