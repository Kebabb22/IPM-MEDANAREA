{% extends "public/base_public.html" %}

{% block content %}

<section class="py-16 bg-white">
<div class="max-w-6xl mx-auto px-6">

<h2 class="text-3xl font-bold text-center text-[#157347] mb-12">
Bidang-Bidang
</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-8">

{% for b in bidang_list %}

<a href="{% url 'detail_bidang' b.slug %}"
class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-xl transition">

<h3 class="font-bold text-lg text-[#157347]">
{{ b.nama }}
</h3>

<p class="text-sm text-gray-600 mt-2">
{{ b.deskripsi|truncatewords:12 }}
</p>

</a>

{% empty %}

<p class="col-span-3 text-center text-gray-500">
Belum ada bidang.
</p>

{% endfor %}

</div>

</div>
</section>

{% endblock %}
