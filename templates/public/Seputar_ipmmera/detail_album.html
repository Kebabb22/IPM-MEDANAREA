{% extends "public/base_public.html" %}

{% block title %}{{ judul }}{% endblock %}

{% block content %}

<section class="py-16">

<div class="max-w-7xl mx-auto px-6">

<h1 class="text-2xl font-bold text-[#157347] mb-8">
{{ judul }}
</h1>

<div class="columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">

{% for f in foto_list %}

<img
src="{{ f.foto.url }}"
class="w-full rounded-xl shadow hover:scale-105 transition cursor-pointer"
onclick="openLightbox({{ forloop.counter0 }})">

{% endfor %}

</div>

</div>

</div>

</section>
<div id="lightbox"
class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

<button onclick="closeLightbox()"
class="absolute top-6 right-6 text-white text-4xl">
×
</button>

<button onclick="prevImage()"
class="absolute left-6 text-white text-4xl">
❮
</button>

<button onclick="nextImage()"
class="absolute right-6 text-white text-4xl">
❯
</button>

<img id="lightbox-img"
class="max-h-[90vh] rounded-lg">

</div>

{% endblock %}
